<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Andes App Redirect</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P97JPSZ63Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-P97JPSZ63Z');
  </script>

  <script>
    window.onload = function () {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const platform = navigator.platform;

      const isAndroid = /android/i.test(ua);
      const isIOS = /iPhone|iPad|iPod/.test(platform) ||
                    (/Macintosh/.test(platform) && 'ontouchend' in document);

      const params = new URLSearchParams(window.location.search);
      const source = params.get('source') || 'unknown';

      gtag('event', 'qr_scan', {
        event_category: 'app_download',
        event_label: source,
        source_medium: source
      });

      setTimeout(function () {
        if (isAndroid) {
          window.location.href = "https://play.google.com/store/apps/details?id=com.andes.laundry&hl=en";
        } else if (isIOS) {
          window.location.href = "https://apps.apple.com/in/app/andes/id6747010488";
        } else {
          window.location.href = "https://wa.me/8626076578";
        }
      }, 500);
    };
  </script>
</head>
<body>
  <h1>Opening Andes...</h1>
  <p>If you are not redirected automatically:</p>
  <ul>
    <li><a href="https://play.google.com/store/apps/details?id=com.andes.laundry&hl=en">Download for Android</a></li>
    <li><a href="https://apps.apple.com/in/app/andes/id6747010488">Download for iOS</a></li>
    <li><a href="https://wa.me/8626076578">Order via WhatsApp</a></li>
  </ul>
</body>
</html>
