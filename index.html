<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Andes</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZxbJBdvg25EI36UeoEYvRUVce6bctrjQ",
      authDomain: "andesuser-792d4.firebaseapp.com",
      projectId: "andesuser-792d4",
      storageBucket: "andesuser-792d4.firebasestorage.app",
      messagingSenderId: "224322264432",
      appId: "1:224322264432:web:b9fc1e3b84dc16571c83b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const platform = navigator.platform;
    const isAndroid = /android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/.test(platform) ||
                  (/Macintosh/.test(platform) && 'ontouchend' in document);

    const params = new URLSearchParams(window.location.search);
    const source = params.get('source') || 'unknown';
    const device = isAndroid ? 'android' : isIOS ? 'ios' : 'other';

    let redirectUrl;
    if (isAndroid) {
      redirectUrl = "intent://details?id=com.andes.laundry#Intent;scheme=market;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;package=com.android.vending;end";
    } else if (isIOS) {
      redirectUrl = "https://apps.apple.com/in/app/andes/id6747010488";
    } else {
      redirectUrl = "https://wa.me/8626076578";
    }

    // ✅ Save first, THEN redirect
    async function trackAndRedirect() {
      try {
        await addDoc(collection(db, "qr_scans"), {
          source: source,
          device: device,
          scannedAt: serverTimestamp()
        });
      } catch (e) {
        console.error("Firestore error:", e);
      } finally {
        // Always redirect, even if Firestore fails
        window.location.href = redirectUrl;
      }
    }

    trackAndRedirect();
  </script>
</head>
<body>
  <p>Opening Andes...</p>
</body>
</html>
